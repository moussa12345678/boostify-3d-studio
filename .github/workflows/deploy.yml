name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a06d1fe28d3ea3d2757d5bb44db3d4 # v4.1.4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Vite (GitHub Pages base path)
        env:
          VITE_BASE_PATH: /boostify-3d-studio/
        run: npm run build:pages

      - name: Add .nojekyll (bypass Jekyll processing)
        run: touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@0b4885b80f0788f5d67b4a4946b854cc77a44b9e # v3.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@7a9bd67a63137380bb94b8e0d2e6d0f6ae8c5e87 # v4.4.3
